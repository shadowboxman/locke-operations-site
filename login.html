<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locke Operations — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2332;
    --bone: #F4F1EA;
    --concrete: #A8A6A0;
    --oxide: #F25A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bone);
    color: var(--navy);
    font-family: "IBM Plex Sans", -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    text-align: center;
    max-width: 360px;
    padding: 32px;
  }
  .wordmark {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: var(--navy);
    margin-bottom: 32px;
  }
  .wordmark .dot { color: var(--oxide); }
  .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--concrete);
    margin-bottom: 10px;
  }
  .status {
    font-size: 15px;
    color: var(--navy);
    margin-bottom: 24px;
  }
  .pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--oxide);
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1; }
  }
  .fallback {
    margin-top: 24px;
    font-size: 13px;
    color: var(--concrete);
  }
  .fallback a {
    color: var(--navy);
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="wordmark">LOCKE <span class="dot">O</span>PERATIONS</div>
  <div class="eyebrow">Client portal</div>
  <div class="status">
    <span class="pulse"></span>Redirecting to sign in...
  </div>
  <div class="fallback">
    Not redirecting? <a href="#" id="manualLink">Continue to sign in</a><br>
    Need help? <a href="mailto:hello@lockeoperations.com">hello@lockeoperations.com</a>
  </div>
</div>

<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_bGl2aW5nLWNvbHQtNTguY2xlcmsuYWNjb3VudHMuZGV2JA"
  src="https://living-colt-58.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  type="text/javascript"
></script>

<script>
  window.addEventListener('load', async () => {
    // Wait for Clerk to load.
    let attempts = 0;
    while (!window.Clerk && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    if (!window.Clerk) {
      document.querySelector('.status').textContent = 'Sign-in failed to load. Try refreshing.';
      return;
    }

    await Clerk.load();

    // If already signed in, go straight to portal.
    if (Clerk.user) {
      window.location.href = '/portal.html';
      return;
    }

    // Otherwise redirect to Clerk's hosted sign-in.
    Clerk.redirectToSignIn({
      afterSignInUrl: window.location.origin + '/portal.html',
      afterSignUpUrl: window.location.origin + '/portal.html',
    });
  });

  document.getElementById('manualLink').addEventListener('click', (e) => {
    e.preventDefault();
    if (window.Clerk && window.Clerk.loaded) {
      Clerk.redirectToSignIn({
        afterSignInUrl: window.location.origin + '/portal.html',
        afterSignUpUrl: window.location.origin + '/portal.html',
      });
    } else {
      window.location.reload();
    }
  });
</script>
</body>
</html>
