<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locke Operations — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2332;
    --bone: #F4F1EA;
    --concrete: #A8A6A0;
    --oxide: #F25A1A;
    --hairline: rgba(26, 35, 50, 0.10);
    --hairline-strong: rgba(26, 35, 50, 0.22);
    --surface: #FAF8F2;
    --topbar-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bone);
    color: var(--navy);
    font-family: "IBM Plex Sans", -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    height: var(--topbar-h);
    background: var(--bone);
    border-bottom: 1px solid var(--navy);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .brand-row { display: flex; align-items: center; gap: 32px; }
  .wordmark {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--navy);
  }
  .wordmark .dot { color: var(--oxide); }
  .portal-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--oxide);
    padding-left: 24px;
    border-left: 1px solid var(--hairline-strong);
  }

  .user-row { display: flex; align-items: center; gap: 16px; }
  .help-link {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--navy);
    padding: 6px 0;
    border-bottom: 1px solid transparent;
  }
  .help-link:hover { border-bottom-color: var(--navy); }
  .user-menu {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--hairline-strong);
    cursor: pointer;
  }
  .avatar {
    width: 26px;
    height: 26px;
    background: var(--navy);
    color: var(--bone);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .user-email {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--navy);
  }
  .user-caret { color: var(--concrete); font-size: 10px; }
  .user-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 220px;
    background: var(--bone);
    border: 1px solid var(--navy);
    display: none;
    z-index: 20;
  }
  .user-dropdown.open { display: block; }
  .dropdown-section {
    padding: 12px 14px;
    border-bottom: 1px solid var(--hairline);
  }
  .dropdown-section:last-child { border-bottom: none; }
  .dropdown-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--concrete);
    margin-bottom: 4px;
  }
  .dropdown-value {
    font-size: 13px;
    color: var(--navy);
    word-break: break-all;
  }
  .dropdown-item {
    display: block;
    width: 100%;
    padding: 10px 14px;
    background: none;
    border: none;
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 13px;
    color: var(--navy);
    text-align: left;
    cursor: pointer;
  }
  .dropdown-item:hover { background: var(--surface); }
  .dropdown-item.danger { color: var(--oxide); }

  /* MAIN */
  main {
    padding: 32px 40px 60px;
    max-width: 1200px;
  }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .page-eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--concrete);
    margin-bottom: 6px;
  }
  h1 {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.015em;
    line-height: 1.15;
    color: var(--navy);
  }
  .page-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--concrete);
  }

  /* BACK LINK */
  .breadcrumb {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--navy);
    margin-bottom: 16px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    display: inline-block;
  }
  .breadcrumb:hover { border-bottom-color: var(--navy); }

  /* BUTTONS */
  button.btn-primary {
    padding: 12px 22px;
    background: var(--oxide);
    color: var(--bone);
    border: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button.btn-primary:hover { background: var(--navy); }
  button.btn-primary:disabled { background: var(--concrete); cursor: not-allowed; }

  button.btn-secondary {
    padding: 10px 18px;
    background: transparent;
    color: var(--navy);
    border: 1px solid var(--hairline-strong);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    cursor: pointer;
  }
  button.btn-secondary:hover { border-color: var(--navy); }

  button.btn-link {
    background: none;
    border: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--oxide);
    cursor: pointer;
    padding: 0;
  }
  button.btn-link:hover { color: var(--navy); }

  /* TABLES */
  .table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bone);
    border: 1px solid var(--hairline-strong);
  }
  .table th {
    text-align: left;
    padding: 12px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--concrete);
    background: var(--surface);
    border-bottom: 1px solid var(--hairline-strong);
    font-weight: 500;
  }
  .table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--hairline);
    font-size: 14px;
    color: var(--navy);
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .badge-active { background: rgba(26, 35, 50, 0.08); color: var(--navy); }
  .badge-suspended { background: rgba(242, 90, 26, 0.12); color: var(--oxide); }
  .badge-archived { background: rgba(168, 65, 46, 0.06); color: var(--concrete); }
  .badge-internal { background: var(--navy); color: var(--bone); }

  /* CARD LAYOUT (mobile alternative to tables) */
  .cards {
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    border: 1px solid var(--hairline-strong);
    background: var(--bone);
    padding: 14px 16px;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { background: var(--surface); }
  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .card-row + .card-row { margin-top: 6px; }
  .card-title {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    word-break: break-word;
  }
  .card-sub {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--concrete);
    word-break: break-all;
  }
  .card-field {
    margin-top: 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .card-field-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--concrete);
    min-width: 70px;
    flex-shrink: 0;
  }
  .card-field-value {
    font-size: 13px;
    color: var(--navy);
    flex: 1;
    word-break: break-word;
  }
  .card-actions {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--hairline);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  /* SECTION HEADER WITH ACTION */
  .section-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    margin-top: 28px;
  }
  .section-row:first-child { margin-top: 0; }
  .section-title {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--navy);
  }
  .section-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--concrete);
  }

  /* EMPTY STATES */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--concrete);
    border: 1px solid var(--hairline-strong);
    background: var(--surface);
  }
  .empty-title {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 13px;
    color: var(--concrete);
    line-height: 1.5;
    max-width: 380px;
    margin: 0 auto;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 35, 50, 0.55);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 50;
    padding-top: 80px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bone);
    border: 1px solid var(--navy);
    width: 100%;
    max-width: 480px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--hairline-strong);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-title {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--navy);
  }
  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    font-family: "IBM Plex Mono", monospace;
    font-size: 14px;
    color: var(--concrete);
  }
  .modal-body { padding: 22px; }
  .modal-footer {
    padding: 16px 22px;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: var(--surface);
  }

  /* FORMS */
  .form-field { display: flex; flex-direction: column; margin-bottom: 16px; }
  .form-field:last-child { margin-bottom: 0; }
  .form-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .form-label .req { color: var(--oxide); }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bone);
    border: 1px solid var(--hairline-strong);
    color: var(--navy);
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 14px;
    outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--navy); }
  .form-help {
    font-size: 12px;
    color: var(--concrete);
    margin-top: 6px;
  }

  /* FLASH MESSAGES */
  .flash {
    background: var(--navy);
    color: var(--bone);
    padding: 12px 18px;
    margin-bottom: 20px;
    display: none;
    font-size: 14px;
  }
  .flash.show { display: block; }
  .flash.error { background: var(--oxide); }

  /* LOADING */
  .loading {
    padding: 60px;
    text-align: center;
    color: var(--concrete);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  /* VIEW SECTIONS */
  .view { display: none; }
  .view.active { display: block; }

  @media (max-width: 900px) {
    main { padding: 24px 16px 40px; }
    .table th, .table td { padding: 10px 8px; font-size: 13px; }
  }

  /* Phone-sized layout */
  @media (max-width: 700px) {
    main { padding: 16px 12px 40px; }

    /* Stack the page header (title + actions) instead of side-by-side */
    .page-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }
    .page-header > div:last-child {
      width: 100%;
      flex-wrap: wrap;
    }

    /* Stack section rows (title + button) */
    .section-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .section-row > div:last-child {
      width: 100%;
      flex-wrap: wrap;
    }

    /* Topbar: hide the user email (still in dropdown), tighten padding.
       Also hide the "Admin" label (the URL tells the user where they are)
       and the "↩ Portal" link (dropdown has "View as client" for the same
       thing). Without this, both wrap on narrow screens. */
    .topbar { padding: 0 12px; gap: 8px; }
    .user-email { display: none; }
    .portal-label { display: none; }
    .help-link { display: none; }
    .brand-row { gap: 16px; }
    .user-row { gap: 8px; }

    /* Swap tables out for the card layout */
    .table { display: none; }
    .cards { display: flex; }

    /* Modal: constrain to viewport on narrow phones */
    .modal-backdrop { padding-top: 32px; padding-left: 12px; padding-right: 12px; }
    .modal { max-width: 100%; }

    /* Org actions buttons wrap when needed */
    #orgActions > div:last-child {
      flex-wrap: wrap;
      gap: 8px !important;
    }
    #orgActions button {
      flex: 1 1 calc(33% - 8px);
      min-width: 0;
      padding: 10px 12px;
      font-size: 10px;
    }

    h1 { font-size: 22px; }
    .modal-title { font-size: 15px; }
  }
</style>

<body>

  <header class="topbar">

      <a class="help-link" href="portal.html">↩ Portal</a>
      <div class="user-menu" id="userMenu">

        <div class="user-email" id="userEmail">loading...</div>

        <div class="user-dropdown" id="userDropdown">
          <div class="dropdown-section">

      <div class="page-header">

          <div class="page-eyebrow">Admin</div>
          <h1>Organizations</h1>

        <div style="display: flex; gap: 10px; align-items: center;">
          <div class="page-meta"><span id="orgsCount">0</span> total</div>
          <button class="btn-primary" id="btnCreateOrg">Create org</button>

<script>
  // ===============================================================
  // Config
  // ===============================================================
  const API_BASE_URL = 'https://locke-operations-site-production.up.railway.app';

  let lockeUser = null;

  // ===============================================================
  // Auth helpers
  // ===============================================================
  async function getAuthHeaders() {
    const token = await Clerk.session.getToken();
    return {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    };
  }

  async function apiGet(path) {
    const res = await fetch(`${API_BASE_URL}${path}`, {
      headers: await getAuthHeaders(),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${res.status}: ${body}`);
    }
    return res.json();
  }

  async function apiPost(path, payload) {
    const res = await fetch(`${API_BASE_URL}${path}`, {
      method: 'POST',
      headers: await getAuthHeaders(),
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${res.status}: ${body}`);
    }
    return res.json();
  }

  async function apiPatch(path, payload) {
    const res = await fetch(`${API_BASE_URL}${path}`, {
      method: 'PATCH',
      headers: await getAuthHeaders(),
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${res.status}: ${body}`);
    }
    return res.json();
  }

  async function apiDelete(path) {
    const res = await fetch(`${API_BASE_URL}${path}`, {
      method: 'DELETE',
      headers: await getAuthHeaders(),
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`${res.status}: ${body}`);
    }
    // 204 No Content is valid; guard the .json()
    const text = await res.text();
    return text ? JSON.parse(text) : { ok: true };
  }

  // ===============================================================
  // Auth guard: Clerk session + admin role check via /api/me
  // ===============================================================
  (async function () {
    let attempts = 0;
    while (!window.Clerk && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    if (!window.Clerk) {
      window.location.href = 'login.html';
      return;
    }
    await Clerk.load({
      // Code-side routing config; replaces the deprecated dashboard
      // Component Paths setting.
      signInUrl: window.location.origin + '/login',
      signUpUrl: window.location.origin + '/signup',
      signInFallbackRedirectUrl: window.location.origin + '/portal',
      signUpFallbackRedirectUrl: window.location.origin + '/portal',
      afterSignOutUrl: window.location.origin + '/',
    });
    if (!Clerk.user || !Clerk.session) {
      window.location.href = 'login.html';
      return;
    }

    // Fetch /api/me to determine role.
    let me;
    try {
      me = await apiGet('/api/me');
    } catch (err) {
      console.error('Failed to load /api/me:', err);
      flash('Portal temporarily unavailable. Try refreshing.', 'error');
      return;
    }

    lockeUser = me.user;
    const isAdmin = (me.memberships || []).some(m =>
      m.role === 'locke_admin' || m.role === 'locke_staff'
    );
    if (!isAdmin) {
      // Non-admin tried to reach /admin. Send them to their portal.
      window.location.href = 'portal.html';
      return;
    }

    // Populate topbar.
    const email = lockeUser.email;
    const displayName = lockeUser.name || email.split('@')[0];
    const initials = (displayName.split(/\s+/).map(p => p[0]).join('') || 'CL')
                       .slice(0, 2).toUpperCase();
    document.getElementById('userEmail').textContent = email;
    document.getElementById('dropdownEmail').textContent = email;
    document.getElementById('avatar').textContent = initials;

    // Show the first view.
    document.getElementById('loadingState').style.display = 'none';
    showView('orgs');
    await loadOrgs();
  })();

  // ===============================================================
  // View routing (orgs list vs org detail)
  // ===============================================================
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.getElementById('flash').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  // ===============================================================
  // Flash messages
  // ===============================================================
  function flash(msg, type) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.classList.remove('error');
    if (type === 'error') el.classList.add('error');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 6000);
  }

  // ===============================================================
  // ORGS LIST
  // ===============================================================
  async function loadOrgs() {
    const container = document.getElementById('orgsTableContainer');
    container.innerHTML = '<div class="loading">Loading organizations...</div>';
    try {
      const { orgs } = await apiGet('/api/admin/orgs');
      document.getElementById('orgsCount').textContent = orgs.length;
      if (!orgs.length) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-title">No organizations yet</div>
            <div class="empty-sub">Click "Create org" to add your first client.</div>
          </div>`;
        return;
      }
      container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Slug</th>
              <th>Status</th>
              <th>Members</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${orgs.map(o => `
              <tr style="cursor:${o.is_internal ? 'default' : 'pointer'};"${o.is_internal ? '' : ` onclick="window.location.href='portal.html?org=${o.id}'"`}>
                <td>
                  ${escapeHtml(o.name)}
                  ${o.is_internal ? '<span class="badge badge-internal" style="margin-left:8px;">Internal</span>' : ''}
                </td>
                <td><code style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--concrete);">${escapeHtml(o.slug)}</code></td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
                <td>${o.member_count}</td>
                <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--concrete);">${fmtDate(o.created_at)}</td>
                <td style="text-align:right;white-space:nowrap;">
                  ${o.is_internal ? '' : `<a href="portal.html?org=${o.id}" class="btn-link" onclick="event.stopPropagation();">Open in portal →</a>`}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="cards">
          ${orgs.map(o => `
            <div class="card${o.is_internal ? '' : ' clickable'}"${o.is_internal ? '' : ` onclick="window.location.href='portal.html?org=${o.id}'"`}>
              <div class="card-row">
                <div class="card-title">
                  ${escapeHtml(o.name)}
                  ${o.is_internal ? '<span class="badge badge-internal">Internal</span>' : ''}
                </div>
                <span class="badge badge-${o.status}">${o.status}</span>
              </div>
              <div class="card-sub" style="margin-top:6px;">${escapeHtml(o.slug)}</div>
              <div class="card-sub" style="margin-top:8px;">
                ${o.member_count} member${o.member_count === 1 ? '' : 's'} · Created ${fmtDate(o.created_at)}
              </div>
              ${o.is_internal ? '' : `<div style="margin-top:10px;"><a href="portal.html?org=${o.id}" class="btn-link" onclick="event.stopPropagation();">Open in portal →</a></div>`}
            </div>
          `).join('')}
        </div>`;
    } catch (err) {
      container.innerHTML = `<div class="empty"><div class="empty-title">Failed to load</div><div class="empty-sub">${escapeHtml(err.message)}</div></div>`;
    }
  }

  // ===============================================================
  // CREATE ORG MODAL
  // ===============================================================
  document.getElementById('btnCreateOrg').addEventListener('click', () => {
    document.getElementById('newOrgName').value = '';
    document.getElementById('newOrgSlug').value = '';
    openModal('modalCreateOrg');
  });

  // Auto-derive slug from name as user types
  document.getElementById('newOrgName').addEventListener('input', (e) => {
    const slugInput = document.getElementById('newOrgSlug');
    // Only auto-fill if user hasn't manually edited the slug.
    if (!slugInput.dataset.touched) {
      slugInput.value = slugify(e.target.value);
    }
  });
  document.getElementById('newOrgSlug').addEventListener('input', (e) => {
    e.target.dataset.touched = '1';
  });

  document.getElementById('btnSubmitCreateOrg').addEventListener('click', async () => {
    const name = document.getElementById('newOrgName').value.trim();
    const slug = document.getElementById('newOrgSlug').value.trim();
    if (!name || !slug) {
      flash('Name and slug are required.', 'error');
      return;
    }
    const btn = document.getElementById('btnSubmitCreateOrg');
    btn.disabled = true;
    btn.textContent = 'Creating...';
    try {
      const org = await apiPost('/api/admin/orgs', { name, slug });
      closeModal('modalCreateOrg');
      flash(`Created "${org.name}".`);
      await loadOrgs();
    } catch (err) {
      flash(`Failed: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create';
    }
  });

  // ===============================================================
  // MODAL helpers
  // ===============================================================
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-backdrop').forEach(bd => {
    bd.addEventListener('click', (e) => {
      if (e.target === bd) bd.classList.remove('open');
    });
  });

  // ===============================================================
  // User dropdown + logout
  // ===============================================================
  const userMenu = document.getElementById('userMenu');
  const dropdown = document.getElementById('userDropdown');
  userMenu.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => dropdown.classList.remove('open'));
  dropdown.addEventListener('click', (e) => e.stopPropagation());

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    if (window.Clerk && Clerk.loaded) await Clerk.signOut();
    window.location.href = 'index.html';
  });

  // ===============================================================
  // Utils
  // ===============================================================
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }
  function slugify(s) {
    return s.toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .slice(0, 60);
  }
</script>
</body>
</html>
